version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - misspell
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - linters: [errcheck]
        text: "Error return value of .* is not checked"
      - linters: [staticcheck]
        text: "SA1019: ch.QueueInspect is deprecated"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
